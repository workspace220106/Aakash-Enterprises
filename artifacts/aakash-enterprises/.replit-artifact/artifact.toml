kind = "web"
previewPath = "/"
title = "Aakash Enterprises"
version = "1.0.0"
id = "artifacts/aakash-enterprises"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20044
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/aakash-enterprises run dev"

[services.env]
PORT = "20044"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/aakash-enterprises", "run", "build"]
publicDir = "artifacts/aakash-enterprises/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
